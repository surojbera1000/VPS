<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kaizen VPS Server - Premium VPS & RDP Hosting</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#0a0e1a;color:#fff;min-height:100vh}
a{text-decoration:none;color:inherit}
.hero{padding:4rem 1rem;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:rgba(0,163,255,0.06);border-radius:50%;filter:blur(80px)}
.hero-content{position:relative;max-width:700px;margin:0 auto}
.badge{display:inline-block;padding:0.5rem 1rem;border-radius:9999px;border:1px solid rgba(245,158,11,0.4);background:rgba(245,158,11,0.1);color:#f59e0b;font-size:0.85rem;margin-bottom:1.5rem}
.headline{font-size:clamp(2rem,6vw,4rem);font-weight:800;background:linear-gradient(135deg,#00a3ff,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1rem}
.subtext{color:#94a3b8;font-size:1.1rem;margin-bottom:2rem}
.buttons{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn-cyan{padding:0.8rem 2rem;border-radius:0.75rem;background:linear-gradient(135deg,#00a3ff,#0077cc);color:#fff;font-weight:600}
.btn-outline{padding:0.8rem 2rem;border-radius:0.75rem;border:1px solid rgba(0,163,255,0.4);color:#00a3ff;font-weight:600}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;max-width:800px;margin:0 auto;padding:2rem 1rem}
.stat{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:1rem;padding:1.5rem;text-align:center;box-shadow:0 0 15px rgba(0,163,255,0.1)}
.stat-num{font-size:2rem;font-weight:700;color:#00a3ff}
.stat-lbl{font-size:0.8rem;color:#94a3b8}
.plans{padding:3rem 1rem;max-width:1100px;margin:0 auto}
.plans-title{text-align:center;font-size:2rem;margin-bottom:2rem}
.plans-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:1.25rem;padding:1.5rem;position:relative;transition:all 0.3s}
.card:hover{border-color:rgba(0,163,255,0.3);transform:translateY(-2px)}
.card-badge{position:absolute;top:-0.6rem;left:1.5rem;font-size:0.65rem;font-weight:700;padding:0.2rem 0.6rem;border-radius:9999px;text-transform:uppercase}
.badge-pop{background:#f59e0b;color:#000}
.badge-best{background:#2dd4bf;color:#000}
.card-name{font-size:1.4rem;font-weight:700;margin:0.5rem 0 0.25rem}
.card-price{font-size:1.8rem;font-weight:700;color:#f59e0b;margin-bottom:0.75rem}
.card-price span{font-size:0.8rem;color:#94a3b8;font-weight:400}
.card-locs{font-size:0.9rem;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid rgba(255,255,255,0.08)}
.spec-row{display:flex;justify-content:space-between;padding:0.35rem 0;font-size:0.85rem}
.spec-row span:first-child{color:#94a3b8}
.card-meta{display:flex;gap:0.75rem;margin:1rem 0;font-size:0.8rem;text-align:center}
.card-meta div{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:0.5rem;padding:0.4rem}
.card-meta small{color:#94a3b8;font-size:0.65rem}
.btn-green{display:block;text-align:center;padding:0.7rem;border-radius:0.75rem;background:rgba(45,212,191,0.15);border:1px solid rgba(45,212,191,0.4);color:#2dd4bf;font-weight:600}
.footer{text-align:center;padding:2rem;color:#64748b;font-size:0.8rem;border-top:1px solid rgba(255,255,255,0.05)}
.fab{position:fixed;bottom:1.5rem;right:1.5rem;background:#2dd4bf;color:#000;font-weight:600;padding:0.7rem 1.2rem;border-radius:9999px;font-size:0.85rem;box-shadow:0 0 15px rgba(45,212,191,0.4);z-index:50}
.empty{text-align:center;grid-column:1/-1;color:#94a3b8;padding:3rem}
@media(min-width:768px){.stats{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<section class="hero"><div class="hero-content">
  <div class="badge">⭐ Trusted by 5000+ Customers Worldwide</div>
  <h1 class="headline">Premium VPS & RDP Hosting</h1>
  <p class="subtext">Trusted by developers, traders, and businesses worldwide.</p>
  <div class="buttons"><a href="#plans" class="btn-cyan">View Server Plans</a><a href="https://t.me/Senkaizen" target="_blank" class="btn-outline">Contact on Telegram</a></div>
</div></section>

<section class="stats">
  <div class="stat"><div class="stat-num">4+</div><div class="stat-lbl">Years Experience</div></div>
  <div class="stat"><div class="stat-num">5000+</div><div class="stat-lbl">Servers Sold</div></div>
  <div class="stat"><div class="stat-num">99.9%</div><div class="stat-lbl">Uptime</div></div>
  <div class="stat"><div class="stat-num">24/7</div><div class="stat-lbl">Support</div></div>
</section>

<section class="plans" id="plans">
  <h2 class="plans-title"><span style="color:#00a3ff">Server</span> Plans</h2>
  <div class="plans-grid" id="grid"></div>
</section>

<footer class="footer"><p>Kaizen VPS Server &copy; 2024</p></footer>
<a href="https://t.me/Senkaizen" target="_blank" class="fab">💬 Chat on Telegram</a>

<script>
fetch("/api/plans").then(r=>r.json()).then(plans=>{
  const g=document.getElementById("grid");
  if(!plans.length){g.innerHTML='<div class="empty">Plans coming soon! Contact us on Telegram.</div>';return;}
  g.innerHTML=plans.map(p=>{
    const bhtml=p.badge==="popular"?'<div class="card-badge badge-pop">POPULAR</div>':p.badge==="best"?'<div class="card-badge badge-best">BEST OFFER</div>':"";
    const bwColor=(p.specs?.bandwidth||"").includes("Unlimited")?"color:#2dd4bf":"";
    return `<div class="card">${bhtml}<h3 class="card-name">${p.name}</h3><div class="card-price">${p.currency||"₹"}${p.price}<span>/month</span></div><div class="card-locs">${(p.locations||[]).join("  ")}</div><div><div class="spec-row"><span>RAM</span><span>${p.specs?.ram||""}</span></div><div class="spec-row"><span>CPU</span><span>${p.specs?.cpu||""}</span></div><div class="spec-row"><span>Storage</span><span>${p.specs?.storage||""}</span></div><div class="spec-row"><span>Bandwidth</span><span style="${bwColor}">${p.specs?.bandwidth||""}</span></div><div class="spec-row"><span>Latency</span><span>${p.specs?.latency||""}</span></div><div class="spec-row"><span>Speed</span><span>${p.specs?.speed||""}</span></div></div><div class="card-meta"><div><small>Validity</small><br>${p.validity||""}</div><div><small>Warranty</small><br>${p.warranty||""}</div></div><a href="https://t.me/Senkaizen" target="_blank" class="btn-green">DM to Buy</a></div>`;
  }).join("");
}).catch(()=>{document.getElementById("grid").innerHTML='<div class="empty">Contact us on Telegram for plans.</div>';});
</script>
</body>
</html>
