<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin - Kaizen VPS Server</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                navy: '#0a0e1a',
                'navy-light': '#111827',
                'navy-card': '#0f1629',
                cyan: '#00a3ff',
                ngreen: '#2dd4bf',
                norange: '#f59e0b',
            },
            fontFamily: {
                inter: ['Inter', 'sans-serif'],
            }
        }
    }
}
</script>
<style>
body { background-color: #0a0e1a; font-family: 'Inter', sans-serif; }
.glass-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
}
.glass-card-hover:hover {
    border-color: rgba(0, 163, 255, 0.2);
    box-shadow: 0 0 30px rgba(0, 163, 255, 0.05);
}
.gradient-border {
    position: relative;
}
.gradient-border::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, rgba(0,163,255,0.4), rgba(45,212,191,0.4), rgba(245,158,11,0.2));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
}
</style>
</head>
<body class="text-white min-h-screen font-inter">


<!-- ============ LOGIN SCREEN ============ -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Background decorative elements -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-cyan/5 rounded-full blur-3xl"></div>
    <div class="absolute top-20 right-20 w-[300px] h-[300px] bg-norange/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-20 left-20 w-[200px] h-[200px] bg-ngreen/5 rounded-full blur-3xl"></div>

    <div class="relative w-full max-w-md">
        <!-- Login Card -->
        <div class="glass-card gradient-border rounded-2xl p-8 md:p-10 text-center animate-fade-in">
            <!-- Lock Icon -->
            <div class="mx-auto w-16 h-16 rounded-2xl bg-gradient-to-br from-cyan/20 to-ngreen/20 border border-cyan/20 flex items-center justify-center mb-6">
                <svg class="w-8 h-8 text-cyan" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>

            <h2 class="text-2xl font-bold mb-2 text-white">Admin Panel</h2>
            <p class="text-slate-400 text-sm mb-8">Kaizen VPS Server Management</p>

            <!-- Password Input -->
            <div class="relative mb-4">
                <input type="password" id="pwInput" placeholder="Enter admin password"
                    class="w-full px-4 py-3.5 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-500 text-sm focus:outline-none focus:border-cyan/50 focus:ring-1 focus:ring-cyan/20 transition-all duration-300">
                <div class="absolute right-4 top-1/2 -translate-y-1/2">
                    <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                </div>
            </div>

            <!-- Error Message -->
            <div id="errMsg" class="text-red-400 text-sm mb-4 min-h-[20px]"></div>

            <!-- Login Button -->
            <button onclick="doLogin()"
                class="w-full py-3.5 rounded-xl font-semibold text-white text-sm bg-gradient-to-r from-cyan to-blue-600 hover:shadow-lg hover:shadow-cyan/25 transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98]">
                Sign In
            </button>

            <p class="text-slate-600 text-xs mt-6">Secured with token-based authentication</p>
        </div>
    </div>
</div>


<!-- ============ DASHBOARD PANEL ============ -->
<div id="panel" class="hidden min-h-screen">
    <!-- Header -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-navy/80 border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Brand -->
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-cyan to-ngreen flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2"/>
                        </svg>
                    </div>
                    <span class="text-lg font-bold text-white">Kaizen Admin</span>
                </div>

                <!-- Right Actions -->
                <div class="flex items-center gap-3">
                    <a href="/" class="text-sm text-slate-400 hover:text-cyan transition-colors flex items-center gap-1.5">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                        </svg>
                        View Site
                    </a>
                    <button onclick="doLogout()"
                        class="px-3.5 py-2 rounded-lg text-sm font-medium text-red-400 border border-red-500/30 hover:bg-red-500/10 hover:border-red-500/50 transition-all duration-200">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </header>


    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Stats Row -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <!-- Total Plans -->
            <div class="glass-card glass-card-hover rounded-2xl p-5 transition-all duration-300">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 rounded-xl bg-cyan/10 border border-cyan/20 flex items-center justify-center">
                        <svg class="w-5 h-5 text-cyan" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                        </svg>
                    </div>
                </div>
                <p class="text-2xl font-bold text-white" id="statTotal">0</p>
                <p class="text-xs text-slate-400 mt-1">Total Plans</p>
            </div>

            <!-- Bandwidth Plans -->
            <div class="glass-card glass-card-hover rounded-2xl p-5 transition-all duration-300">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 rounded-xl bg-norange/10 border border-norange/20 flex items-center justify-center">
                        <svg class="w-5 h-5 text-norange" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                </div>
                <p class="text-2xl font-bold text-white" id="statBandwidth">0</p>
                <p class="text-xs text-slate-400 mt-1">Bandwidth Plans</p>
            </div>

            <!-- Unlimited Plans -->
            <div class="glass-card glass-card-hover rounded-2xl p-5 transition-all duration-300">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 rounded-xl bg-ngreen/10 border border-ngreen/20 flex items-center justify-center">
                        <svg class="w-5 h-5 text-ngreen" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                        </svg>
                    </div>
                </div>
                <p class="text-2xl font-bold text-white" id="statUnlimited">0</p>
                <p class="text-xs text-slate-400 mt-1">Unlimited Plans</p>
            </div>

            <!-- Renewal Plans -->
            <div class="glass-card glass-card-hover rounded-2xl p-5 transition-all duration-300">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 rounded-xl bg-purple-500/10 border border-purple-500/20 flex items-center justify-center">
                        <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                    </div>
                </div>
                <p class="text-2xl font-bold text-white" id="statRenewal">0</p>
                <p class="text-xs text-slate-400 mt-1">Renewal Plans</p>
            </div>
        </div>


        <!-- Toolbar -->
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-lg font-semibold text-white">Server Plans</h2>
            <button onclick="openAdd()"
                class="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-cyan to-blue-600 hover:shadow-lg hover:shadow-cyan/25 transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98]">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                Add Plan
            </button>
        </div>

        <!-- Plans Table -->
        <div class="glass-card rounded-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-white/5">
                            <th class="text-left px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">Name</th>
                            <th class="text-left px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">Category</th>
                            <th class="text-left px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">Price</th>
                            <th class="text-left px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">RAM</th>
                            <th class="text-left px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">Bandwidth</th>
                            <th class="text-right px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tbody" class="divide-y divide-white/5">
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>


<!-- ============ ADD/EDIT MODAL ============ -->
<div class="fixed inset-0 z-[100] hidden items-center justify-center p-4" id="modal">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>

    <!-- Modal Card -->
    <div class="relative w-full max-w-2xl max-h-[90vh] overflow-y-auto glass-card rounded-2xl border border-white/10 p-6 md:p-8 animate-modal-in">
        <!-- Modal Header -->
        <div class="flex items-center justify-between mb-6">
            <h3 id="modalTitle" class="text-xl font-bold text-white">Add Plan</h3>
            <button onclick="closeModal()" class="w-8 h-8 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-colors">
                <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- Form -->
        <form onsubmit="savePlan(event)" class="space-y-5">
            <!-- Row 1: Name + Category -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5">Plan Name</label>
                    <input id="f_name" required placeholder="e.g. DO1"
                        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-600 text-sm focus:outline-none focus:border-cyan/40 focus:ring-1 focus:ring-cyan/20 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5">Category</label>
                    <select id="f_cat"
                        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white text-sm focus:outline-none focus:border-cyan/40 focus:ring-1 focus:ring-cyan/20 transition-all appearance-none cursor-pointer">
                        <option value="bandwidth">Bandwidth</option>
                        <option value="unlimited">Unlimited</option>
                        <option value="renewal">Renewal</option>
                    </select>
                </div>
            </div>

            <!-- Row 2: Price + Badge -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5">Price (₹)</label>
                    <input id="f_price" type="number" required placeholder="350"
                        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-600 text-sm focus:outline-none focus:border-cyan/40 focus:ring-1 focus:ring-cyan/20 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5">Badge</label>
                    <select id="f_badge"
                        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white text-sm focus:outline-none focus:border-cyan/40 focus:ring-1 focus:ring-cyan/20 transition-all appearance-none cursor-pointer">
                        <option value="">None</option>
                        <option value="popular">Popular</option>
                        <option value="best">Best Offer</option>
                    </select>
                </div>
            </div>

            <!-- Locations -->
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1.5">Locations (comma separated)</label>
                <input id="f_locs" required placeholder="🇺🇸 USA, 🇮🇳 India, 🇸🇬 Singapore"
                    class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-600 text-sm focus:outline-none focus:border-cyan/40 focus:ring-1 focus:ring-cyan/20 transition-all">
            </div>


            <!-- Row 3: RAM + CPU -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5">RAM</label>
                    <input id="f_ram" required placeholder="8 GB"
                        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-600 text-sm focus:outline-none focus:border-cyan/40 focus:ring-1 focus:ring-cyan/20 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5">CPU</label>
                    <input id="f_cpu" required placeholder="4 Core"
                        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-600 text-sm focus:outline-none focus:border-cyan/40 focus:ring-1 focus:ring-cyan/20 transition-all">
                </div>
            </div>

            <!-- Row 4: Storage + Bandwidth -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5">Storage</label>
                    <input id="f_storage" required placeholder="160 GB NVMe"
                        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-600 text-sm focus:outline-none focus:border-cyan/40 focus:ring-1 focus:ring-cyan/20 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5">Bandwidth</label>
                    <input id="f_bw" required placeholder="5 TB"
                        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-600 text-sm focus:outline-none focus:border-cyan/40 focus:ring-1 focus:ring-cyan/20 transition-all">
                </div>
            </div>

            <!-- Row 5: Latency + Speed -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5">Latency</label>
                    <input id="f_lat" required placeholder="95 ms"
                        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-600 text-sm focus:outline-none focus:border-cyan/40 focus:ring-1 focus:ring-cyan/20 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5">Speed</label>
                    <input id="f_speed" required placeholder="Up to 2 Gbps"
                        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-600 text-sm focus:outline-none focus:border-cyan/40 focus:ring-1 focus:ring-cyan/20 transition-all">
                </div>
            </div>

            <!-- Row 6: Validity + Warranty -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5">Validity</label>
                    <input id="f_val" value="30 Days" required
                        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-600 text-sm focus:outline-none focus:border-cyan/40 focus:ring-1 focus:ring-cyan/20 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5">Warranty</label>
                    <input id="f_war" value="15 Days" required
                        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-600 text-sm focus:outline-none focus:border-cyan/40 focus:ring-1 focus:ring-cyan/20 transition-all">
                </div>
            </div>


            <!-- Form Actions -->
            <div class="flex gap-3 pt-2">
                <button type="submit"
                    class="flex-1 py-3.5 rounded-xl font-semibold text-white text-sm bg-gradient-to-r from-cyan to-blue-600 hover:shadow-lg hover:shadow-cyan/25 transition-all duration-300 transform hover:scale-[1.01] active:scale-[0.99]">
                    Save Plan
                </button>
                <button type="button" onclick="closeModal()"
                    class="flex-1 py-3.5 rounded-xl font-semibold text-slate-300 text-sm border border-white/15 hover:bg-white/5 hover:border-white/25 transition-all duration-300">
                    Cancel
                </button>
            </div>
        </form>
    </div>
</div>

<!-- ============ TOAST NOTIFICATION ============ -->
<div id="toast" class="fixed top-6 right-6 z-[200] hidden transform transition-all duration-300">
    <div class="flex items-center gap-3 px-5 py-3.5 rounded-xl backdrop-blur-xl border text-sm font-medium shadow-2xl" id="toastInner">
        <svg id="toastIcon" class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <span id="toastMsg"></span>
    </div>
</div>

<!-- ============ JAVASCRIPT ============ -->
<script>
let token = "", editId = null;
const $ = id => document.getElementById(id);

window.onload = () => {
    const t = sessionStorage.getItem("kt");
    if (t) { token = t; showPanel(); }
};

async function doLogin() {
    const pw = $("pwInput").value;
    const r = await fetch("/api/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: pw })
    });
    const d = await r.json();
    if (d.success) {
        token = d.token;
        sessionStorage.setItem("kt", token);
        showPanel();
    } else {
        $("errMsg").textContent = "Wrong password";
    }
}

function doLogout() {
    sessionStorage.removeItem("kt");
    location.reload();
}

function showPanel() {
    $("loginScreen").style.display = "none";
    $("panel").classList.remove("hidden");
    $("panel").classList.add("block");
    loadPlans();
}
</script>


<script>
async function loadPlans() {
    const r = await fetch("/api/plans");
    const d = await r.json();
    const tb = $("tbody");

    // Update stats
    $("statTotal").textContent = d.length;
    $("statBandwidth").textContent = d.filter(p => p.category === "bandwidth").length;
    $("statUnlimited").textContent = d.filter(p => p.category === "unlimited").length;
    $("statRenewal").textContent = d.filter(p => p.category === "renewal").length;

    if (!d.length) {
        tb.innerHTML = `
            <tr>
                <td colspan="6" class="px-6 py-16 text-center">
                    <div class="flex flex-col items-center">
                        <div class="w-16 h-16 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center mb-4">
                            <svg class="w-8 h-8 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                            </svg>
                        </div>
                        <p class="text-slate-400 text-sm font-medium mb-1">No plans yet</p>
                        <p class="text-slate-600 text-xs">Click "+ Add Plan" to create your first server plan</p>
                    </div>
                </td>
            </tr>`;
        return;
    }

    tb.innerHTML = d.map(p => `
        <tr class="group">
            <td class="px-6 py-4">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan/20 to-ngreen/10 border border-cyan/20 flex items-center justify-center text-xs font-bold text-cyan">
                        ${p.name.charAt(0)}
                    </div>
                    <span class="font-semibold text-white">${p.name}</span>
                </div>
            </td>
            <td class="px-6 py-4">
                <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-medium
                    ${p.category === 'unlimited' ? 'bg-ngreen/10 text-ngreen border border-ngreen/20' :
                      p.category === 'renewal' ? 'bg-purple-500/10 text-purple-400 border border-purple-500/20' :
                      'bg-norange/10 text-norange border border-norange/20'}">
                    ${p.category}
                </span>
            </td>
            <td class="px-6 py-4 font-medium text-white">${p.currency || "₹"}${p.price}</td>
            <td class="px-6 py-4 text-slate-300">${p.specs?.ram || "-"}</td>
            <td class="px-6 py-4 text-slate-300">${p.specs?.bandwidth || "-"}</td>
            <td class="px-6 py-4 text-right">
                <div class="flex items-center justify-end gap-2 opacity-70 group-hover:opacity-100 transition-opacity">
                    <button onclick='editPlan(${JSON.stringify(p).replace(/'/g,"&#39;")})'
                        class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium text-cyan bg-cyan/10 border border-cyan/20 hover:bg-cyan/20 hover:border-cyan/40 transition-all">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                        </svg>
                        Edit
                    </button>
                    <button onclick="delPlan('${p._id}')"
                        class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium text-red-400 bg-red-500/10 border border-red-500/20 hover:bg-red-500/20 hover:border-red-500/40 transition-all">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                        Delete
                    </button>
                </div>
            </td>
        </tr>
    `).join("");
}
</script>


<script>
function openAdd() {
    editId = null;
    $("modalTitle").textContent = "Add Plan";
    clearForm();
    $("modal").classList.remove("hidden");
    $("modal").classList.add("flex");
}

function closeModal() {
    $("modal").classList.add("hidden");
    $("modal").classList.remove("flex");
}

function clearForm() {
    ["f_name","f_price","f_locs","f_ram","f_cpu","f_storage","f_bw","f_lat","f_speed"].forEach(id => $(id).value = "");
    $("f_cat").value = "bandwidth";
    $("f_badge").value = "";
    $("f_val").value = "30 Days";
    $("f_war").value = "15 Days";
}

function editPlan(p) {
    editId = p._id;
    $("modalTitle").textContent = "Edit Plan";
    $("f_name").value = p.name;
    $("f_cat").value = p.category;
    $("f_price").value = p.price;
    $("f_badge").value = p.badge || "";
    $("f_locs").value = (p.locations || []).join(", ");
    $("f_ram").value = p.specs?.ram || "";
    $("f_cpu").value = p.specs?.cpu || "";
    $("f_storage").value = p.specs?.storage || "";
    $("f_bw").value = p.specs?.bandwidth || "";
    $("f_lat").value = p.specs?.latency || "";
    $("f_speed").value = p.specs?.speed || "";
    $("f_val").value = p.validity || "30 Days";
    $("f_war").value = p.warranty || "15 Days";
    $("modal").classList.remove("hidden");
    $("modal").classList.add("flex");
}

async function savePlan(e) {
    e.preventDefault();
    const data = {
        name: $("f_name").value,
        category: $("f_cat").value,
        price: Number($("f_price").value),
        currency: "₹",
        badge: $("f_badge").value || null,
        locations: $("f_locs").value.split(",").map(s => s.trim()).filter(Boolean),
        specs: {
            ram: $("f_ram").value,
            cpu: $("f_cpu").value,
            storage: $("f_storage").value,
            bandwidth: $("f_bw").value,
            latency: $("f_lat").value,
            speed: $("f_speed").value
        },
        validity: $("f_val").value,
        warranty: $("f_war").value
    };
    const url = editId ? `/api/plans/${editId}` : "/api/plans";
    const method = editId ? "PUT" : "POST";
    try {
        const r = await fetch(url, {
            method,
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
            body: JSON.stringify(data)
        });
        const d = await r.json();
        if (r.ok) {
            toast(editId ? "Plan updated successfully!" : "Plan added successfully!");
            closeModal();
            loadPlans();
        } else {
            toast("Error: " + (d.error || "Failed"), true);
        }
    } catch (err) {
        toast("Network error: " + err.message, true);
    }
}

async function delPlan(id) {
    if (!confirm("Are you sure you want to delete this plan?")) return;
    const r = await fetch(`/api/plans/${id}`, {
        method: "DELETE",
        headers: { "Authorization": "Bearer " + token }
    });
    if (r.ok) {
        toast("Plan deleted successfully!");
        loadPlans();
    }
}

function toast(msg, isError = false) {
    const t = $("toast");
    const inner = $("toastInner");
    const icon = $("toastIcon");
    $("toastMsg").textContent = msg;

    if (isError) {
        inner.className = "flex items-center gap-3 px-5 py-3.5 rounded-xl backdrop-blur-xl border text-sm font-medium shadow-2xl bg-red-500/10 border-red-500/30 text-red-400";
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>';
    } else {
        inner.className = "flex items-center gap-3 px-5 py-3.5 rounded-xl backdrop-blur-xl border text-sm font-medium shadow-2xl bg-ngreen/10 border-ngreen/30 text-ngreen";
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>';
    }

    t.classList.remove("hidden");
    t.classList.add("animate-slide-in");
    setTimeout(() => {
        t.classList.add("hidden");
        t.classList.remove("animate-slide-in");
    }, 3000);
}
</script>
</body>
</html>
