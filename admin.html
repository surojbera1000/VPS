<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin - Kaizen VPS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Inter,sans-serif;background:#0a0e1a;color:#fff;min-height:100vh}.login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}.login-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:1rem;padding:2.5rem;max-width:380px;width:100%;text-align:center}.login-card h2{margin-bottom:0.5rem}.login-card p{color:#94a3b8;font-size:0.85rem;margin-bottom:1.5rem}input,select{width:100%;padding:0.7rem;border-radius:0.5rem;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:0.85rem;margin-bottom:0.75rem;outline:none}input:focus,select:focus{border-color:#00a3ff}.btn{padding:0.7rem 1.5rem;border-radius:0.7rem;border:none;font-weight:600;cursor:pointer;font-size:0.85rem}.btn-cyan{background:linear-gradient(135deg,#00a3ff,#0077cc);color:#fff;width:100%}.header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.08)}.header a{color:#00a3ff;font-size:0.85rem;margin-right:1rem;text-decoration:none}.btn-logout{background:none;border:1px solid rgba(239,68,68,0.4);color:#ef4444;padding:0.4rem 0.8rem;border-radius:0.5rem;cursor:pointer;font-size:0.8rem}.main{max-width:1000px;margin:0 auto;padding:1.5rem}.btn-add{background:linear-gradient(135deg,#00a3ff,#0077cc);color:#fff;padding:0.6rem 1.5rem;border-radius:0.7rem;border:none;font-weight:600;cursor:pointer;margin-bottom:1.5rem}table{width:100%;border-collapse:collapse;font-size:0.8rem;background:rgba(255,255,255,0.02);border-radius:0.75rem;overflow:hidden}th{text-align:left;padding:0.7rem;color:#94a3b8;font-size:0.7rem;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.08)}td{padding:0.7rem;border-bottom:1px solid rgba(255,255,255,0.04)}.btn-edit{background:rgba(0,163,255,0.15);color:#00a3ff;border:1px solid rgba(0,163,255,0.3);padding:0.3rem 0.6rem;border-radius:0.4rem;cursor:pointer;font-size:0.7rem;margin-right:0.3rem}.btn-del{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3);padding:0.3rem 0.6rem;border-radius:0.4rem;cursor:pointer;font-size:0.7rem}.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;z-index:100;padding:1rem}.overlay.show{display:flex}.modal{background:#0f1629;border:1px solid rgba(255,255,255,0.1);border-radius:1rem;padding:1.5rem;width:100%;max-width:550px;max-height:90vh;overflow-y:auto}.modal h3{margin-bottom:1rem}.row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}.lbl{font-size:0.7rem;color:#94a3b8;margin-bottom:0.2rem}.form-actions{display:flex;gap:0.75rem;margin-top:1rem}.form-actions .btn{flex:1}.btn-cancel{background:none;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:0.7rem;border-radius:0.7rem;cursor:pointer}.toast{position:fixed;top:1rem;right:1rem;background:rgba(45,212,191,0.15);border:1px solid rgba(45,212,191,0.4);color:#2dd4bf;padding:0.6rem 1rem;border-radius:0.7rem;font-size:0.85rem;z-index:200;display:none}.err{color:#ef4444;font-size:0.8rem;margin-bottom:0.5rem}#panel{display:none}
</style>
</head>
<body>
<div id="loginScreen" class="login"><div class="login-card"><h2>Admin Panel</h2><p>Kaizen VPS Server</p><input type="password" id="pwInput" placeholder="Enter password"><div id="errMsg" class="err"></div><button class="btn btn-cyan" onclick="doLogin()">Login</button></div></div>
<div id="panel"><div class="header"><b>Kaizen Admin</b><div><a href="/">View Site</a><button class="btn-logout" onclick="doLogout()">Logout</button></div></div><div class="main"><button class="btn-add" onclick="openAdd()">+ Add Plan</button><div style="overflow-x:auto"><table><thead><tr><th>Name</th><th>Category</th><th>Price</th><th>RAM</th><th>BW</th><th>Actions</th></tr></thead><tbody id="tbody"></tbody></table></div></div></div>
<div class="overlay" id="modal"><div class="modal"><h3 id="modalTitle">Add Plan</h3><form onsubmit="savePlan(event)"><div class="row"><div><div class="lbl">Name</div><input id="f_name" required></div><div><div class="lbl">Category</div><select id="f_cat"><option value="bandwidth">Bandwidth</option><option value="unlimited">Unlimited</option><option value="renewal">Renewal</option></select></div></div><div class="row"><div><div class="lbl">Price</div><input id="f_price" type="number" required></div><div><div class="lbl">Badge</div><select id="f_badge"><option value="">None</option><option value="popular">Popular</option><option value="best">Best Offer</option></select></div></div><div><div class="lbl">Locations (comma separated)</div><input id="f_locs" placeholder="🇺🇸 USA, 🇮🇳 India" required></div><div class="row"><div><div class="lbl">RAM</div><input id="f_ram" required></div><div><div class="lbl">CPU</div><input id="f_cpu" required></div></div><div class="row"><div><div class="lbl">Storage</div><input id="f_storage" required></div><div><div class="lbl">Bandwidth</div><input id="f_bw" required></div></div><div class="row"><div><div class="lbl">Latency</div><input id="f_lat" required></div><div><div class="lbl">Speed</div><input id="f_speed" required></div></div><div class="row"><div><div class="lbl">Validity</div><input id="f_val" value="30 Days" required></div><div><div class="lbl">Warranty</div><input id="f_war" value="15 Days" required></div></div><div class="form-actions"><button type="submit" class="btn btn-cyan">Save</button><button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button></div></form></div></div>
<div class="toast" id="toast"></div>
<script>
let token="",editId=null;const $=id=>document.getElementById(id);
window.onload=()=>{const t=sessionStorage.getItem("kt");if(t){token=t;showPanel();}};
async function doLogin(){const pw=$("pwInput").value;const r=await fetch("/api/auth",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pw})});const d=await r.json();if(d.success){token=d.token;sessionStorage.setItem("kt",token);showPanel();}else $("errMsg").textContent="Wrong password";}
function doLogout(){sessionStorage.removeItem("kt");location.reload();}
function showPanel(){$("loginScreen").style.display="none";$("panel").style.display="block";loadPlans();}
async function loadPlans(){const r=await fetch("/api/plans");const d=await r.json();const tb=$("tbody");if(!d.length){tb.innerHTML='<tr><td colspan="6" style="text-align:center;padding:2rem;color:#64748b">No plans yet. Click + Add Plan</td></tr>';return;}tb.innerHTML=d.map(p=>`<tr><td><b>${p.name}</b></td><td>${p.category}</td><td>${p.currency||"₹"}${p.price}</td><td>${p.specs?.ram||""}</td><td>${p.specs?.bandwidth||""}</td><td><button class="btn-edit" onclick='editPlan(${JSON.stringify(p).replace(/'/g,"&#39;")})'>Edit</button><button class="btn-del" onclick="delPlan('${p._id}')">Del</button></td></tr>`).join("");}
function openAdd(){editId=null;$("modalTitle").textContent="Add Plan";clearForm();$("modal").classList.add("show");}
function closeModal(){$("modal").classList.remove("show");}
function clearForm(){["f_name","f_price","f_locs","f_ram","f_cpu","f_storage","f_bw","f_lat","f_speed"].forEach(id=>$(id).value="");$("f_cat").value="bandwidth";$("f_badge").value="";$("f_val").value="30 Days";$("f_war").value="15 Days";}
function editPlan(p){editId=p._id;$("modalTitle").textContent="Edit Plan";$("f_name").value=p.name;$("f_cat").value=p.category;$("f_price").value=p.price;$("f_badge").value=p.badge||"";$("f_locs").value=(p.locations||[]).join(", ");$("f_ram").value=p.specs?.ram||"";$("f_cpu").value=p.specs?.cpu||"";$("f_storage").value=p.specs?.storage||"";$("f_bw").value=p.specs?.bandwidth||"";$("f_lat").value=p.specs?.latency||"";$("f_speed").value=p.specs?.speed||"";$("f_val").value=p.validity||"30 Days";$("f_war").value=p.warranty||"15 Days";$("modal").classList.add("show");}
async function savePlan(e){e.preventDefault();const data={name:$("f_name").value,category:$("f_cat").value,price:Number($("f_price").value),currency:"₹",badge:$("f_badge").value||null,locations:$("f_locs").value.split(",").map(s=>s.trim()).filter(Boolean),specs:{ram:$("f_ram").value,cpu:$("f_cpu").value,storage:$("f_storage").value,bandwidth:$("f_bw").value,latency:$("f_lat").value,speed:$("f_speed").value},validity:$("f_val").value,warranty:$("f_war").value};const url=editId?`/api/plans/${editId}`:"/api/plans";const method=editId?"PUT":"POST";const r=await fetch(url,{method,headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify(data)});if(r.ok){toast(editId?"Updated!":"Added!");closeModal();loadPlans();}else toast("Failed!");}
async function delPlan(id){if(!confirm("Delete this plan?"))return;const r=await fetch(`/api/plans/${id}`,{method:"DELETE",headers:{"Authorization":"Bearer "+token}});if(r.ok){toast("Deleted!");loadPlans();}}
function toast(msg){const t=$("toast");t.textContent=msg;t.style.display="block";setTimeout(()=>t.style.display="none",2500);}
</script>
</body>
</html>
